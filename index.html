<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>大考中心單字考試</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#f0f4f8;color:#1a1a2e}
.screen{display:none;min-height:100vh;padding:16px}
.screen.active{display:block}

/* ── Setup Screen ── */
.app-header{display:flex;align-items:center;gap:12px;padding:16px 0 6px}
.app-icon{width:44px;height:44px;background:#1a56db;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.app-icon span{color:#fff;font-size:20px;font-weight:800}
.app-title{font-size:20px;font-weight:800;color:#1a56db}
.app-sub{font-size:13px;color:#6b7280;margin-top:2px}

.setup-card{background:#fff;border-radius:16px;padding:18px 16px;margin-bottom:14px;border:1px solid #e5e7eb}
.card-label{font-size:11px;font-weight:800;color:#1a56db;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}

.level-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.level-grid .btn-all{grid-column:span 3}
.btn-opt{padding:12px 8px;border:2px solid #e5e7eb;border-radius:10px;background:#fff;font-size:15px;font-weight:600;cursor:pointer;color:#374151;transition:all .15s;text-align:center;width:100%}
.btn-opt:active{transform:scale(.96)}
.btn-opt.selected{border-color:#1a56db;background:#eff6ff;color:#1a56db}

.count-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mode-grid .btn-opt{padding:14px 8px;font-size:15px}

.btn-start{display:block;width:100%;padding:18px;background:#1a56db;color:#fff;border:none;border-radius:14px;font-size:18px;font-weight:800;cursor:pointer;margin-top:6px;letter-spacing:.5px}
.btn-start:active{background:#1e40af;transform:scale(.98)}
.btn-start:disabled{background:#93c5fd;cursor:not-allowed;transform:none}

/* ── Quiz Screen ── */
.prog-wrap{background:#e5e7eb;border-radius:99px;height:8px;margin-bottom:14px;overflow:hidden}
.prog-bar{height:8px;background:#1a56db;border-radius:99px;transition:width .3s}
.q-meta{display:flex;justify-content:space-between;font-size:14px;color:#6b7280;font-weight:600;margin-bottom:20px}
.q-score-badge{background:#eff6ff;color:#1a56db;padding:4px 12px;border-radius:99px;font-size:14px;font-weight:700}

.q-card{background:#fff;border-radius:16px;padding:28px 20px;margin-bottom:16px;border:1px solid #e5e7eb;text-align:center}
.q-prompt{font-size:28px;font-weight:800;color:#111827;line-height:1.3;word-break:break-word}
.q-pos{font-size:14px;color:#9ca3af;margin-top:8px}

.choices{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.choice-btn{padding:18px 16px;border:2px solid #e5e7eb;border-radius:12px;background:#fff;font-size:16px;font-weight:600;cursor:pointer;text-align:left;color:#1f2937;transition:all .15s;line-height:1.4;word-break:break-word}
.choice-btn:active:not(:disabled){transform:scale(.98)}
.choice-btn.correct{border-color:#15803d !important;background:#f0fdf4 !important;color:#15803d}
.choice-btn.wrong{border-color:#dc2626 !important;background:#fef2f2 !important;color:#dc2626}
.choice-btn.reveal{border-color:#15803d !important;background:#f0fdf4 !important;color:#15803d}
.choice-btn:disabled{cursor:not-allowed}

.next-btn{display:none;width:100%;padding:17px;background:#1a56db;color:#fff;border:none;border-radius:12px;font-size:17px;font-weight:800;cursor:pointer}
.next-btn:active{background:#1e40af}

/* ── Result Screen ── */
.result-top{background:#fff;border-radius:16px;padding:28px 20px;margin-bottom:14px;text-align:center;border:1px solid #e5e7eb}
.score-ring{display:inline-flex;align-items:center;justify-content:center;width:120px;height:120px;border-radius:50%;border:6px solid #1a56db;font-size:36px;font-weight:800;color:#1a56db;margin-bottom:16px}
.score-msg{font-size:20px;font-weight:800;margin-bottom:6px;color:#111827}
.score-sub{font-size:14px;color:#6b7280;line-height:1.5}

.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.stat-box{background:#fff;border-radius:12px;padding:14px 8px;text-align:center;border:1px solid #e5e7eb}
.stat-num{font-size:26px;font-weight:800;color:#1a56db}
.stat-num.red{color:#dc2626}
.stat-lbl{font-size:12px;color:#6b7280;margin-top:2px;font-weight:600}

.review-title{font-size:16px;font-weight:800;color:#dc2626;margin-bottom:12px;padding-top:4px}
.review-nav{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.rev-btn{padding:14px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;border:2px solid #e5e7eb;background:#fff;color:#374151}
.rev-btn:active:not(:disabled){background:#f9fafb}
.rev-btn:disabled{opacity:.35;cursor:not-allowed}
.rev-counter{text-align:center;font-size:13px;color:#6b7280;font-weight:600;margin-bottom:12px}

.review-card{background:#fff;border-radius:14px;padding:20px;border:1px solid #e5e7eb;margin-bottom:14px}
.tag-wrong{display:inline-block;padding:4px 12px;border-radius:99px;font-size:12px;font-weight:800;background:#fef2f2;color:#dc2626;margin-bottom:12px}
.rev-q-label{font-size:13px;color:#6b7280;margin-bottom:4px;font-weight:600}
.rev-q-text{font-size:17px;font-weight:700;color:#374151;margin-bottom:12px;line-height:1.4;word-break:break-word}
.rev-ans-label{font-size:13px;color:#6b7280;margin-bottom:4px;font-weight:600}
.rev-ans-text{font-size:22px;font-weight:800;color:#111827;margin-bottom:6px;word-break:break-word}
.rev-pos{font-size:13px;color:#9ca3af}
.rev-yours{font-size:14px;color:#dc2626;margin-top:10px;font-weight:600}

.btn-again{display:block;width:100%;padding:17px;background:#1a56db;color:#fff;border:none;border-radius:12px;font-size:17px;font-weight:800;cursor:pointer;margin-top:4px}
.btn-again:active{background:#1e40af}
.btn-reset{display:block;width:100%;padding:16px;background:#fff;color:#1a56db;border:2px solid #1a56db;border-radius:12px;font-size:16px;font-weight:800;cursor:pointer;margin-top:10px;margin-bottom:20px}
.btn-reset:active{background:#eff6ff}

@media(min-width:480px){
  .screen{max-width:500px;margin:0 auto;padding:24px 20px}
  .q-prompt{font-size:32px}
  .choice-btn{font-size:17px;padding:20px 18px}
}
@media(min-width:768px){
  .screen{max-width:600px;padding:32px 24px}
}

.rev-sentence{font-size:15px;color:#374151;margin-top:12px;line-height:1.8;padding:12px 16px;background:#fffbeb;border-left:4px solid #f59e0b;border-radius:0 8px 8px 0;margin-bottom:4px}
.rev-sentence .hw{font-weight:800;color:#1a56db}
</style>

</head>
<body>

<div class="screen active" id="screen-setup">
  <div class="app-header">
    <div class="app-icon"><span>英</span></div>
    <div>
      <div class="app-title">大考中心單字考試</div>
      <div class="app-sub">Level 1–6 共 6,379 個單字</div>
    </div>
  </div>

  <div class="setup-card" style="margin-top:16px">
    <div class="card-label">出題範圍（可多選）</div>
    <div class="level-grid">
      <button class="btn-opt" data-val="1" onclick="toggleLevel(this)">Level 1</button>
      <button class="btn-opt" data-val="2" onclick="toggleLevel(this)">Level 2</button>
      <button class="btn-opt" data-val="3" onclick="toggleLevel(this)">Level 3</button>
      <button class="btn-opt" data-val="4" onclick="toggleLevel(this)">Level 4</button>
      <button class="btn-opt" data-val="5" onclick="toggleLevel(this)">Level 5</button>
      <button class="btn-opt" data-val="6" onclick="toggleLevel(this)">Level 6</button>
      <button class="btn-opt btn-all" data-val="all" id="btn-all" onclick="toggleLevel(this)">全部混合</button>
    </div>
  </div>

  <div class="setup-card">
    <div class="card-label">每回合題數</div>
    <div class="count-grid">
      <button class="btn-opt selected" data-val="10" onclick="selectOne('count-group',this)">10 題</button>
      <button class="btn-opt" data-val="20" onclick="selectOne('count-group',this)">20 題</button>
      <button class="btn-opt" data-val="50" onclick="selectOne('count-group',this)">50 題</button>
    </div>
  </div>

  <div class="setup-card">
    <div class="card-label">題型</div>
    <div class="mode-grid">
      <button class="btn-opt selected" data-val="c2e" onclick="selectOne('mode-group',this)">中文 → 英文</button>
      <button class="btn-opt" data-val="e2c" onclick="selectOne('mode-group',this)">英文 → 中文</button>
    </div>
  </div>

  <button class="btn-start" id="start-btn" onclick="startQuiz()" disabled>開始考試</button>
</div>

<div class="screen" id="screen-quiz">
  <div class="prog-wrap"><div class="prog-bar" id="prog"></div></div>
  <div id="uid-badge" style="text-align:right;font-size:12px;color:#9ca3af;margin-bottom:6px;font-weight:500"></div>
  <div class="q-meta">
    <span id="q-counter">第 1 題 / 共 10 題</span>
    <span class="q-score-badge" id="q-score">答對 0</span>
  </div>
  <div class="q-card">
    <div class="q-prompt" id="q-prompt"></div>
    <div class="q-pos" id="q-pos"></div>
  </div>
  <div class="choices" id="choices"></div>
  <button class="next-btn" id="next-btn" onclick="nextQuestion()">下一題 →</button>
</div>

<div class="screen" id="screen-result">
  <div class="result-top">
    <div class="score-ring" id="score-ring"></div>
    <div class="score-msg" id="score-msg"></div>
    <div class="score-sub" id="score-sub"></div>
  </div>
  <div class="stats-row">
    <div class="stat-box"><div class="stat-num" id="st-correct"></div><div class="stat-lbl">答對</div></div>
    <div class="stat-box"><div class="stat-num red" id="st-wrong"></div><div class="stat-lbl">答錯</div></div>
    <div class="stat-box"><div class="stat-num" id="st-pct"></div><div class="stat-lbl">正確率</div></div>
  </div>

  <div id="review-section" style="display:none">
    <div class="review-title">✗ 錯誤題目複習</div>
    <div class="review-nav">
      <button class="rev-btn" id="rev-prev" onclick="reviewNav(-1)" disabled>← 上一題</button>
      <button class="rev-btn" id="rev-next" onclick="reviewNav(1)">下一題 →</button>
    </div>
    <div class="rev-counter" id="rev-counter"></div>
    <div id="review-display"></div>
  </div>

  <button class="btn-again" onclick="restartSame()">再考一次（相同設定）</button>
  <button class="btn-reset" onclick="backToSetup()">重新設定考試</button>
</div>

櫥","The fashion designer meticulously curated an extensive wardrobe collection that reflected contemporary aesthetic trends and cultural diversity throughout multiple seasonal collections."],[6,"warfare","n.","戰爭","Modern cyber warfare has become increasingly sophisticated, posing unprecedented challenges to national security and critical infrastructure protection worldwide."],[6,"warranty","n.","保證書；擔保","The manufacturer's comprehensive warranty covers all defects in materials and workmanship for a period of two years from the date of purchase."],[6,"waterproof / watertight","adj.","防水的","The engineers implemented a comprehensive waterproof sealing system to prevent moisture infiltration in the underground infrastructure project."],[6,"whatsoever","pron.adv.adj.","任何事物；無論甚麼(的)","The research committee found no evidence whatsoever to support the controversial claims made in the preliminary study."],[6,"windshield","n.","擋風玻璃","The automotive engineer recommended replacing the damaged windshield with a laminated safety glass to enhance vehicle protection."],[6,"withstand","vt.vi.","反抗；禁得起","The newly constructed bridge was engineered to withstand extreme weather conditions and heavy traffic loads for at least fifty years."],[6,"witty","adj.","機智的；說話風趣的","The professor's witty remarks about classical literature not only entertained the students but also deepened their understanding of the text."],[6,"woo","vt.vi.","追求；求愛；爭取","The marketing department's ambitious strategy aimed to woo environmentally conscious consumers by highlighting the company's sustainable manufacturing practices and ethical sourcing commitments."],[6,"wrench","vt.vi.n.","猛扭；扭傷","The sudden wrench of the steering wheel during the emergency maneuver caused the driver to suffer a painful shoulder injury."],[6,"wrestle","vt.","摔(角)；與…搏鬥","The legendary athlete spent years wrestling with both physical opponents and his inner demons before achieving ultimate championship victory."],[6,"Xerox / xerox","n.","影印機(商標名)； 靜電複印法","The company's administrative department invested in a new Xerox machine to streamline document processing and reduce operational costs significantly."],[6,"yearn","vi.","思念；渴望","After years of working in the corporate sector, she began to yearn for the creative fulfillment that her previous artistic career had once provided her."],[6,"zeal","n.","熱心；熱誠","The young researcher's zeal for discovering new treatments led her to work tirelessly in the laboratory every single day."]];
</script>
<script>
var selLevels = new Set();
var quizCount = 10;
var quizMode = 'c2e';
var questions = [];
var curQ = 0;
var score = 0;
var answered = false;
var wrongList = [];
var revIdx = 0;

function toggleLevel(btn) {
  // 單選：先清除所有選取，再選這一個
  document.querySelectorAll('.level-grid .btn-opt').forEach(function(b){ b.classList.remove('selected'); });
  btn.classList.add('selected');
  selLevels.clear();
  var val = btn.dataset.val;
  if (val === 'all') {
    selLevels.add('all');
  } else {
    selLevels.add(parseInt(val));
  }
  document.getElementById('start-btn').disabled = false;
}

function selectOne(group, btn) {
  var btns = btn.parentElement.querySelectorAll('.btn-opt');
  btns.forEach(function(b){ b.classList.remove('selected'); });
  btn.classList.add('selected');
  if (group === 'count-group') quizCount = parseInt(btn.dataset.val);
  if (group === 'mode-group') quizMode = btn.dataset.val;
}

function getPool() {
  if (selLevels.has('all')) return WORDS.slice();
  return WORDS.filter(function(w){ return selLevels.has(w[0]); });
}

function shuffle(arr) {
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
  }
  return arr;
}

function startQuiz() {
  var pool = getPool();
  if (pool.length < 5) { alert('單字不足，請多選幾個 Level'); return; }
  questions = shuffle(pool.slice()).slice(0, Math.min(quizCount, pool.length));
  curQ = 0; score = 0; wrongList = [];
  // GA4: quiz_start event
  var lvLabel = selLevels.has('all') ? 'all' : 'Level ' + [...selLevels][0];
  if (typeof gtag !== 'undefined') {
    gtag('event', 'quiz_start', {
      student_id: currentUID,
      quiz_level: lvLabel,
      question_count: questions.length
    });
  }
  showScreen('screen-quiz');
  // Show UID badge
  var badge = document.getElementById('uid-badge');
  if (badge) { badge.textContent = currentUID !== 'anonymous' ? '學生：' + currentUID : ''; }
  renderQ();
}

function renderQ() {
  var q = questions[curQ];
  var total = questions.length;
  document.getElementById('prog').style.width = Math.round((curQ / total) * 100) + '%';
  document.getElementById('q-counter').textContent = '第 ' + (curQ + 1) + ' 題 / 共 ' + total + ' 題';
  document.getElementById('q-score').textContent = '答對 ' + score;
  answered = false;

  var isC2E = (quizMode === 'c2e');
  document.getElementById('q-prompt').textContent = isC2E ? q[3] : q[1];
  document.getElementById('q-pos').textContent = q[2] ? '（' + q[2] + '）' : '';

  var pool = getPool();
  var others = shuffle(pool.filter(function(w){ return w[1] !== q[1]; })).slice(0, 4);
  var all = shuffle([q].concat(others));

  var box = document.getElementById('choices');
  box.innerHTML = '';
  all.forEach(function(w) {
    var btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = isC2E ? w[1] : w[3];
    btn.dataset.ok = (w[1] === q[1]) ? '1' : '0';
    btn.onclick = function(){ pick(btn, q); };
    box.appendChild(btn);
  });

  var nb = document.getElementById('next-btn');
  nb.style.display = 'none';
  nb.textContent = (curQ < questions.length - 1) ? '下一題 →' : '查看結果';
}

function pick(btn, q) {
  if (answered) return;
  answered = true;
  if (btn.dataset.ok === '1') {
    btn.classList.add('correct');
    score++;
  } else {
    btn.classList.add('wrong');
    wrongList.push({ q: q, chosen: btn.textContent });
    document.querySelectorAll('.choice-btn').forEach(function(b){
      if (b.dataset.ok === '1') b.classList.add('reveal');
    });
  }
  document.querySelectorAll('.choice-btn').forEach(function(b){ b.disabled = true; });
  document.getElementById('q-score').textContent = '答對 ' + score;
  document.getElementById('next-btn').style.display = 'block';
}

function nextQuestion() {
  curQ++;
  if (curQ >= questions.length) showResult();
  else renderQ();
}

function showResult() {
  showScreen('screen-result');
  var total = questions.length;
  var pct = Math.round((score / total) * 100);
  // GA4: quiz_complete event
  var lvLabel = selLevels.has('all') ? 'all' : 'Level ' + [...selLevels][0];
  if (typeof gtag !== 'undefined') {
    gtag('event', 'quiz_complete', {
      student_id: currentUID,
      quiz_level: lvLabel,
      quiz_score: score,
      quiz_total: total,
      quiz_pct: pct
    });
  }
  document.getElementById('score-ring').textContent = pct + '%';
  document.getElementById('st-correct').textContent = score;
  document.getElementById('st-wrong').textContent = total - score;
  document.getElementById('st-pct').textContent = pct + '%';

  var msg, sub;
  if (pct >= 95) { msg = '太厲害了！滿分達人！'; sub = '對這些單字掌握得非常紮實，繼續保持！'; }
  else if (pct >= 80) { msg = '表現優秀！'; sub = '只差一點就滿分了，多加練習一定沒問題！'; }
  else if (pct >= 60) { msg = '及格通過！繼續加油！'; sub = '基礎不錯，多複習錯誤題目就能大幅進步！'; }
  else if (pct >= 40) { msg = '還需要多練習！'; sub = '別灰心，多看幾遍單字，再來挑戰一次！'; }
  else { msg = '加油！持續努力！'; sub = '先從低 Level 開始，打好基礎再往上挑戰！'; }

  document.getElementById('score-msg').textContent = msg;
  document.getElementById('score-sub').textContent = sub;

  var rs = document.getElementById('review-section');
  if (wrongList.length > 0) {
    rs.style.display = 'block';
    revIdx = 0;
    renderReview();
  } else {
    rs.style.display = 'none';
  }
}

function highlightWord(sentence, english) {
  if (!sentence) return '';
  var forms = english.split('/').map(function(f){ return f.replace(/[()\[\]]/g,'').trim(); });
  var escaped = forms.filter(Boolean).map(function(f){ return f.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); });
  if (!escaped.length) return sentence;
  var pattern = new RegExp('\\b(' + escaped.join('|') + ')\\b', 'gi');
  return sentence.replace(pattern, '<strong class="hw">$1</strong>');
}

function renderReview() {
  var total = wrongList.length;
  // GA4: review_start event (only fire once)
  if (revIdx === 0 && total > 0 && typeof gtag !== 'undefined') {
    gtag('event', 'review_start', {
      student_id: currentUID,
      wrong_count: total
    });
  }
  document.getElementById('rev-counter').textContent = '第 ' + (revIdx + 1) + ' 題 / 共 ' + total + ' 題錯誤';
  document.getElementById('rev-prev').disabled = (revIdx === 0);
  document.getElementById('rev-next').disabled = (revIdx === total - 1);
  var item = wrongList[revIdx];
  var q = item.q;
  var isC2E = (quizMode === 'c2e');
  var sentence = q[4] || '';
  var sentHtml = sentence
    ? '<div class="rev-sentence">💡 ' + highlightWord(sentence, q[1]) + '</div>'
    : '';
  document.getElementById('review-display').innerHTML =
    '<div class="review-card">' +
    '<span class="tag-wrong">✗ 答錯</span>' +
    '<div class="rev-q-label">' + (isC2E ? '中文題目' : '英文題目') + '</div>' +
    '<div class="rev-q-text">' + (isC2E ? q[3] : q[1]) + '</div>' +
    '<div class="rev-ans-label">正確答案</div>' +
    '<div class="rev-ans-text">' + (isC2E ? q[1] : q[3]) + '</div>' +
    (q[2] ? '<div class="rev-pos">詞性：' + q[2] + '</div>' : '') +
    sentHtml +
    '<div class="rev-yours">你的答案：' + item.chosen + '</div>' +
    '</div>';
}

function reviewNav(dir) { revIdx += dir; renderReview(); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function backToSetup() { showScreen('screen-setup'); }

function restartSame() {
  var pool = getPool();
  questions = shuffle(pool.slice()).slice(0, Math.min(quizCount, pool.length));
  curQ = 0; score = 0; wrongList = [];
  showScreen('screen-quiz');
  // Show UID badge
  var badge = document.getElementById('uid-badge');
  if (badge) { badge.textContent = currentUID !== 'anonymous' ? '學生：' + currentUID : ''; }
  renderQ();
}
</script>
</body>
</html>
